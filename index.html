<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Business Card</title>
  <meta name="description" content="Digital business card" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- The card is built from config.js — you normally never edit this file. -->
  <main class="card" id="card">
    <header class="card__header">
      <div class="avatar" id="avatar"></div>
      <h1 class="card__name" id="name"></h1>
      <p class="card__role" id="role"></p>

      <div class="quick-actions">
        <a class="quick-actions__btn" id="quickCall" aria-label="Call">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.02-.24 11.36 11.36 0 0 0 3.57.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.36 11.36 0 0 0 .57 3.57 1 1 0 0 1-.25 1.02l-2.2 2.2Z"/></svg>
          <span>Call</span>
        </a>
        <a class="quick-actions__btn" id="quickEmail" aria-label="Email">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 5.5 12 12l9.5-6.5L12 2 2.5 5.5Zm0 1.8V18a2 2 0 0 0 2 2h15a2 2 0 0 0 2-2V7.3L12 13.8 2.5 7.3Z"/></svg>
          <span>Email</span>
        </a>
      </div>
    </header>

    <section class="card__body">
      <p class="bio" id="bio"></p>

      <ul class="details" id="details"></ul>

      <div class="social" id="social" hidden>
        <h2 class="social__title">Social Media</h2>
        <div class="social__links" id="socialLinks"></div>
      </div>

      <button class="btn btn--primary" id="downloadBtn" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 14a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-3.31 0-6 1.79-6 4v1h12v-1c0-2.21-2.69-4-6-4ZM5 11H2v2h3v3h2v-3h3v-2H7V8H5v3Z"/></svg>
        Download vCard
      </button>
      <button class="btn btn--ghost" id="shareBtn" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16a3 3 0 0 0-2.4 1.2l-6.7-3.9a3 3 0 0 0 0-2.6l6.7-3.9A3 3 0 1 0 15 4a3 3 0 0 0 .1.8L8.4 8.7a3 3 0 1 0 0 6.6l6.7 3.9A3 3 0 1 0 18 16Z"/></svg>
        Share This Page
      </button>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
